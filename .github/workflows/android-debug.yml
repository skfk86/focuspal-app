name: Android Debug Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Inject Groq API key from secret
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          sed -i "s/const DEFAULT_GROQ_KEY = '';/const DEFAULT_GROQ_KEY = '${GROQ_API_KEY}';/" www/index.html

      # No android/ folder is committed to the repo — we generate it fresh
      # on every run, then re-apply our small native tweaks on top of it.
      - name: Add Android platform
        run: npx cap add android

      - name: Apply native customizations
        run: python3 scripts/patch-android.py

      - name: Sync Capacitor (web assets -> native project)
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focuspal-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
